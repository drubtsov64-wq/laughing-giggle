[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

    # CSP: базовая, без внешних CDN. Если у тебя есть внешние шрифты/скрипты/аналитика — скажи, расширим точечно.
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' /.netlify/functions/; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
